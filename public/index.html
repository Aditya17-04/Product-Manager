<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Product Manager</h1>
    <p class="subtitle">Basic frontend for your Express + MongoDB API</p>

    <section class="card">
      <h2 id="formTitle">Add Product</h2>
      <form id="productForm" class="form-grid">
        <label>
          Name
          <input id="name" type="text" required />
        </label>
        <label>
          Quantity
          <input id="quantity" type="number" min="0" value="0" required />
        </label>
        <label>
          Price
          <input id="price" type="number" min="0" step="0.01" value="0" required />
        </label>
        <label>
          Image URL (optional)
          <input id="image" type="url" placeholder="https://example.com/image.jpg" />
        </label>
        <button id="submitBtn" type="submit">Add Product</button>
        <button id="cancelEditBtn" class="secondary-btn hidden" type="button">Cancel Edit</button>
      </form>
      <p id="status" class="status"></p>
    </section>

    <section class="card">
      <h2>Products</h2>
      <div id="products" class="products"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
